name: Build and Release Mozc Dictionary

on:
  push:
    tags:
      - 'v*'  # Trigger only when a tag starting with "v" is pushed
  workflow_dispatch:
    inputs:
      mozc_ref:
        description: 'google/mozc ref to use for dictionary resources'
        required: false
        default: 'master'

env:
  MOZC_REF: ${{ github.event.inputs.mozc_ref || 'master' }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Checkout Mozc once so id.def, dictionary, suffix, connection, and single_kanji files share one revision.
      - name: Checkout google/mozc
        uses: actions/checkout@v4
        with:
          repository: google/mozc
          ref: ${{ env.MOZC_REF }}
          path: mozc-src

      # Set up JDK 17 for Kotlin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      # Copy base dictionary files
      - name: Copy Mozc dictionary resources
        run: |
          mkdir -p ./src/main/resources
          cp ./mozc-src/src/data/dictionary_oss/id.def ./src/main/resources/id.def
          for i in $(seq -w 00 09); do
            cp ./mozc-src/src/data/dictionary_oss/dictionary${i}.txt ./src/main/resources/dictionary${i}.txt
          done
          cp ./mozc-src/src/data/dictionary_oss/connection_single_column.txt ./src/main/resources/connection_single_column.txt
          cp ./mozc-src/src/data/dictionary_oss/suffix.txt ./src/main/resources/suffix.txt
          cp ./mozc-src/src/data/single_kanji/single_kanji.tsv ./src/main/resources/single_kanji.tsv

      - name: Verify Mozc resources exist
        run: |
          test -s ./src/main/resources/id.def
          test -s ./src/main/resources/connection_single_column.txt
          test -s ./src/main/resources/suffix.txt
          test -s ./src/main/resources/single_kanji.tsv
          for i in $(seq -w 00 09); do
            test -s ./src/main/resources/dictionary${i}.txt
          done

      - name: Validate Mozc id.def
        run: ./gradlew validateMozcIdDef

      - name: Validate Mozc connection matrix
        run: ./gradlew validateConnectionMatrix

      - name: Validate Mozc dictionary IDs
        run: ./gradlew validateDictionaryIds

      # Build the project with Gradle
      - name: Compile Kotlin
        run: ./gradlew clean compileKotlin

      - name: Generate official Mozc data
        run: ./gradlew -PmozcSrcDir="$PWD/mozc-src/src" -PmozcBazelCommand=bazelisk generateOfficialMozcData

      - name: Verify official Mozc data
        run: ./gradlew -PmozcSrcDir="$PWD/mozc-src/src" -PmozcBazelCommand=bazelisk verifyMozcData

      - name: Write Mozc data manifest
        run: ./gradlew -PmozcSrcDir="$PWD/mozc-src/src" -PmozcBazelCommand=bazelisk writeMozcDataManifest

      - name: Test with Gradle
        run: ./gradlew -PmozcSrcDir="$PWD/mozc-src/src" -PmozcBazelCommand=bazelisk test

      # --- Run all dictionary creation tasks in parallel ---
      # 各タスクをバックグラウンドで並列実行し、すべての完了を待ちます。
      - name: Run all dictionary creation tasks in parallel
        run: |
          ./gradlew run &
          ./gradlew runMozcUT &
          ./gradlew runMozcUTWiki &
          ./gradlew runMozcUTNeologd &
          ./gradlew runMozcUTWikiNeologdCommon &
          wait

      - name: Package Mozc Android bundle
        run: ./gradlew -PmozcSrcDir="$PWD/mozc-src/src" -PmozcBazelCommand=bazelisk packageMozcAndroidBundle

      # --- (新規) リリース用に成果物を整理し、zip圧縮する ---
      - name: Organize and zip artifacts for release
        run: |
          # zipファイルと、その中に入れるファイル用のディレクトリを作成
          mkdir -p release_zips
          mkdir -p artifacts_temp/main artifacts_temp/mozc_ut artifacts_temp/mozc_ut_wiki artifacts_temp/mozc_ut_neologd artifacts_temp/web

          # main.kt由来のファイルを移動
          mv ./src/main/resources/{yomi_singleKanji,tango_singleKanji,token_singleKanji}.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}_emoji.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}_emoticon.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}_symbol.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}_reading_correction.dat artifacts_temp/main/
          mv ./src/main/resources/{yomi,tango,token}_kotowaza.dat artifacts_temp/main/

          # MozcUT.kt由来のファイルを移動
          mv ./src/main/resources/*_{person_names,places}.dat artifacts_temp/mozc_ut/

          # MozcUTWiki.kt由来のファイルを移動
          mv ./src/main/resources/*_wiki.dat artifacts_temp/mozc_ut_wiki/

          # MozcUTNeologd.kt由来のファイルを移動
          mv ./src/main/resources/*_neologd.dat artifacts_temp/mozc_ut_neologd/
          
          # MozcUTWikiNeologdCommon.kt由来のファイルを移動
          mv ./src/main/resources/*_web.dat artifacts_temp/web/

          # 各ディレクトリをzip圧縮
          (cd artifacts_temp/main && zip -r ../../release_zips/main_dictionaries.zip .)
          (cd artifacts_temp/mozc_ut && zip -r ../../release_zips/mozc_ut_dictionaries.zip .)
          (cd artifacts_temp/mozc_ut_wiki && zip -r ../../release_zips/wiki_dictionary.zip .)
          (cd artifacts_temp/mozc_ut_neologd && zip -r ../../release_zips/neologd_dictionary.zip .)
          (cd artifacts_temp/web && zip -r ../../release_zips/web_dictionary.zip .)
          cp ./build/distributions/mozc_android_bundle.zip ./release_zips/mozc_android_bundle.zip

      # --- Create a single release with all generated artifacts ---
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          name: Release ${{ github.ref }}
          # ルートに配置するファイルと、各辞書をまとめたzipファイルを指定
          artifacts: |
            ./src/main/resources/connectionId.dat
            ./src/main/resources/pos_table.dat
            ./release_zips/main_dictionaries.zip
            ./release_zips/mozc_ut_dictionaries.zip
            ./release_zips/wiki_dictionary.zip
            ./release_zips/neologd_dictionary.zip
            ./release_zips/web_dictionary.zip
            ./release_zips/mozc_android_bundle.zip
          replacesArtifacts: false
