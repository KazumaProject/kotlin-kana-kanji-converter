name: Build and Release JapaneseKeyboard Dictionary Assets

on:
  push:
    tags:
      - 'v*'  # Trigger only when a tag starting with "v" is pushed
  workflow_dispatch:
    inputs:
      mozc_ref:
        description: 'google/mozc ref to use for dictionary resources'
        required: false
        default: 'master'

env:
  MOZC_REF: ${{ github.event.inputs.mozc_ref || 'master' }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Checkout Mozc once so id.def, dictionary, suffix, connection, and single_kanji files share one revision.
      - name: Checkout google/mozc
        uses: actions/checkout@v4
        with:
          repository: google/mozc
          ref: ${{ env.MOZC_REF }}
          path: mozc-src

      # Set up JDK 17 for Kotlin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Copy base dictionary files
      - name: Copy Mozc dictionary resources
        run: |
          mkdir -p ./src/main/resources
          cp ./mozc-src/src/data/dictionary_oss/id.def ./src/main/resources/id.def
          for i in $(seq -w 00 09); do
            cp ./mozc-src/src/data/dictionary_oss/dictionary${i}.txt ./src/main/resources/dictionary${i}.txt
          done
          cp ./mozc-src/src/data/dictionary_oss/connection_single_column.txt ./src/main/resources/connection_single_column.txt
          cp ./mozc-src/src/data/dictionary_oss/suffix.txt ./src/main/resources/suffix.txt
          cp ./mozc-src/src/data/single_kanji/single_kanji.tsv ./src/main/resources/single_kanji.tsv
          cp ./mozc-src/src/data/zero_query/zero_query.def ./src/main/resources/zero_query.def
          cp ./mozc-src/src/data/zero_query/zero_query_number.def ./src/main/resources/zero_query_number.def
          cp ./mozc-src/src/data/emoji/emoji_data.tsv ./src/main/resources/mozc_emoji_data.tsv
          cp ./mozc-src/src/data/emoticon/categorized.tsv ./src/main/resources/mozc_emoticon_categorized.tsv
          cp ./mozc-src/src/data/symbol/symbol.tsv ./src/main/resources/mozc_symbol.tsv

      - name: Verify Mozc resources exist
        run: |
          test -s ./src/main/resources/id.def
          test -s ./src/main/resources/connection_single_column.txt
          test -s ./src/main/resources/suffix.txt
          test -s ./src/main/resources/single_kanji.tsv
          test -s ./src/main/resources/zero_query.def
          test -s ./src/main/resources/zero_query_number.def
          test -s ./src/main/resources/mozc_emoji_data.tsv
          test -s ./src/main/resources/mozc_emoticon_categorized.tsv
          test -s ./src/main/resources/mozc_symbol.tsv
          test -f ./src/main/custom_zero_query.def
          for i in $(seq -w 00 09); do
            test -s ./src/main/resources/dictionary${i}.txt
          done

      - name: Validate Mozc resource consistency
        run: ./gradlew validateMozcIdDef validateConnectionMatrix validateDictionaryIds validateIdDefReferences

      - name: Validate Mozc zero query resources
        run: ./gradlew validateMozcZeroQueryResources

      # Build the project with Gradle
      - name: Compile Kotlin
        run: ./gradlew clean compileKotlin

      - name: Test with Gradle
        run: ./gradlew test

      - name: Verify Mozc zero query parity
        run: ./gradlew verifyMozcZeroQueryParity -PmozcSourceDir=./mozc-src

      - name: Generate and verify Mozc zero query data
        run: ./gradlew generateMozcZeroQueryData verifyMozcZeroQueryData

      - name: Generate dictionaries, N-gram presence data, package assets, and verify
        run: >
          ./gradlew
          generateStableTermIdMap
          generateTokenArrayV2
          generateNgramPresenceData
          verifyNgramPresenceData
          dumpNgramPresenceManifest
          packageJapaneseKeyboardDictionaryAssets
          verifyJapaneseKeyboardDictionaryAssets

      # --- Create a single release with the JapaneseKeyboard-ready assets zip ---
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          name: Release ${{ github.ref }}
          artifacts: ./release_zips/japanese_keyboard_dictionary_assets.zip
          allowUpdates: true
          artifactErrorsFailBuild: true
          removeArtifacts: true
          replacesArtifacts: true
